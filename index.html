<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Arcade</title>
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="home-wrapper">
      <header class="home-header">
        <h1 class="home-title">🎮 Arcade</h1>
        <p class="home-subtitle">Pick a game and play!</p>
      </header>

      <div class="game-cards">

        <!-- Snake card -->
        <a class="game-card snake-card" href="snake/index.html">
          <div class="card-icon">🐍</div>
          <h2 class="card-name">Snake</h2>
          <p class="card-desc">
            Eat food, grow your snake, and don't crash!<br/>
            Solo or 2-player mode.
          </p>
          <span class="card-btn snake-btn">Play →</span>
        </a>

        <!-- Dino card -->
        <a class="game-card dino-card" href="dino/index.html">
          <div class="card-icon">🦕</div>
          <h2 class="card-name">Dino Run</h2>
          <p class="card-desc">
            Jump over cacti and survive as long as you can!<br/>
            Speed increases as you level up.
          </p>
          <span class="card-btn dino-btn">Play →</span>
        </a>

      </div>
    </div>
    </body>
</html>
