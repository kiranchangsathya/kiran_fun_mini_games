<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Arcade</title>
    <link rel="stylesheet" href="shared/theme.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <div class="home-wrapper">
      <header class="home-header">
        <h1 class="home-title">🎮 Arcade</h1>
        <p class="home-subtitle">Pick a game and play!</p>
      </header>
      <!-- Cards are injected here by home.js reading games.config.js -->
      <div class="game-cards" id="gameCards"></div>
    </div>

    <script type="module">
      import { GAMES } from './games.config.js';

      const container = document.getElementById('gameCards');

      GAMES.forEach(game => {
        const a = document.createElement('a');
        a.className = 'game-card';
        a.href      = game.href;
        a.style.setProperty('--accent', game.accentColor);
        a.innerHTML = `
          <div class="card-icon">${game.emoji}</div>
          <h2 class="card-name">${game.name}</h2>
          <p class="card-desc">${game.description}</p>
          <p class="card-controls">${game.controls}</p>
          <span class="card-btn">Play →</span>
        `;
        container.appendChild(a);
      });
    </script>
  </body>
</html>
